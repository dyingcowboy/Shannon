    # Ollama: local models are free. Zero-price lookup handled in Go pricing code
    # (CostForSplit returns 0 when input=0 && output=0 && combined=0).
    # No need to list individual models here.

    # Synthetic models for external tool cost attribution.
    # Each tool call = 7500 synthetic output tokens (≈ $2/1M token billing rate).
    # combined_per_1k = actual_cost_per_call / 7.5
    # Verify: (7500 / 1000) × combined_per_1k = cost_per_call
    shannon-scraper:
      shannon_web_search:
        combined_per_1k: 0.002        # (7500/1000) × 0.002 = $0.015 (SerpAPI)
      shannon_firecrawl:
        combined_per_1k: 0.000133     # (7500/1000) × 0.000133 ≈ $0.001 (Firecrawl)
      shannon_web_fetch:
        combined_per_1k: 0.00035      # SMALL model weighted avg; fallback only (real cost via cost_usd override)

# Feature flags for advanced capabilities
