    - claude-opus-4-5-20251101  # 200K tokens
    - claude-sonnet-4-5-20250929  # 200K tokens
    - kimi-k2.5  # 256K tokens
    - MiniMax-M2.7  # 204K tokens
    - glm-5  # 200K tokens

# Rate limiting configuration
# Per-provider RPM is disabled by default (0). The gateway layer handles
# per-user rate limiting. Only set default_rpm > 0 if you need a global
# backend safety net across all providers.
rate_limits:
  default_rpm: 0
  default_tpm: 100000
  tier_overrides:
    small:
      rpm: 120
      tpm: 200000
    medium:
      rpm: 60
      tpm: 100000
    large:
      rpm: 30
      tpm: 50000

# Monitoring and alerting
monitoring:
  enabled: true
  metrics_export_interval: 30
  cost_tracking: true
  performance_tracking: true
  error_tracking: true
  
alerts:
  cost_threshold_usd: 400.0
  error_rate_threshold: 0.05
  latency_threshold_ms: 30000
