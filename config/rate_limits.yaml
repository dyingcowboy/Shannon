# Shannon: Rate Limits Configuration
# This file is loaded alongside config/shannon.yaml

# Rate limit tiers (requests per window)
# Applied per API key based on api_keys.tier column
# Precedence: per-key rate_limit_override > tier config > api_keys.rate_limit_per_hour (floor)
tiers:
  free:
    requests_per_minute: 60
    requests_per_hour: 1000
    requests_per_day: 10000
  pro:
    requests_per_minute: 200
    requests_per_hour: 5000
    requests_per_day: 50000
  max:
    requests_per_minute: 300
    requests_per_hour: 10000
    requests_per_day: 100000
  admin:
    requests_per_minute: 1000
    requests_per_hour: 100000
    requests_per_day: 1000000
