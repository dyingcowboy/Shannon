# Shannon Platform - Model Configuration
# GitHub: https://github.com/Kocoro-lab/Shannon
# Updated: November 2025 with latest AI models and pricing
#
# NOTE: Model tier selection is driven by:
#   1. Task complexity score (computed during decomposition)
#   2. Explicit tier requests from callers
#   3. Budget constraints and token limits
#   4. API payload override (e.g., provider_override, deep_research payload, etc.)
#
# The percentages below (50/40/10) are target distributions for reference,
# NOT enforced quotas. Actual usage depends on workload characteristics.
# Monitor real distribution via Prometheus metrics: llm_requests_total{tier="..."}
# ATTENTION: ONLY openai, anthropic, xai and google MODELS ARE TESTED as of now.

model_tiers:
  small:
    # Target allocation: 50% (not enforced - actual usage depends on complexity)
    # Fast, cost-optimized models for basic tasks without reasoning capabilities
    providers:
      - provider: openai
        model: gpt-5-nano-2025-08-07
        priority: 2
      - provider: anthropic
        model: claude-haiku-4-5-20251001
        priority: 1
      - provider: xai
        model: grok-4-1-fast-non-reasoning
        priority: 3
      - provider: google
        model: gemini-2.5-flash-lite
        priority: 4
      - provider: deepseek
        model: deepseek-chat
        priority: 5
      - provider: qwen
        model: qwen3-4b-instruct-2507
        priority: 6
      - provider: meta
        model: llama-3.2-3b
        priority: 7
      - provider: zai
        model: glm-4.7-flash
        priority: 8
      - provider: kimi
        model: kimi-k2-turbo-preview
        priority: 9
      - provider: minimax
        model: MiniMax-M2.7-highspeed
        priority: 10

  medium:
    # Target allocation: 40% (not enforced - actual usage depends on complexity)
    # Standard models with good capability/cost balance, not heavy reasoning
    providers:
      - provider: anthropic
        model: claude-sonnet-4-6
        priority: 1
      - provider: anthropic
        model: claude-sonnet-4-5-20250929
        priority: 2
      - provider: openai
        model: gpt-5-mini-2025-08-07
        priority: 3
      - provider: google
        model: gemini-2.5-flash
        priority: 4
      - provider: meta
        model: llama-4-scout
        priority: 5
      - provider: deepseek
        model: deepseek-chat
        priority: 6
      - provider: qwen
        model: qwen3-8b
        priority: 7
      - provider: zai
        model: glm-4.7
        priority: 8
      - provider: kimi
        model: kimi-k2.5
        priority: 9
      - provider: minimax
        model: MiniMax-M2.7
        priority: 10

  large:
    # Target allocation: 10% (not enforced - actual usage depends on complexity)
    # Heavy thinking/reasoning models for complex tasks
    providers:
      - provider: anthropic
        model: claude-opus-4-6
        priority: 1
      - provider: openai
        model: gpt-5.1
        priority: 2
      - provider: anthropic
        model: claude-opus-4-5-20251101
        priority: 3
      - provider: anthropic
        model: claude-opus-4-1-20250805
        priority: 4
      - provider: xai
        model: grok-4-1-fast-reasoning
        priority: 5
      - provider: google
        model: gemini-2.5-pro
        priority: 6
      - provider: google
        model: gemini-3-pro-preview
        priority: 7
      - provider: deepseek
        model: deepseek-reasoner
        priority: 8
      - provider: qwen
        model: qwen3-omni-30b-a3b-instruct
        priority: 9
      - provider: meta
        model: llama-3.1-405b
        priority: 10
      - provider: zai
        model: glm-5
        priority: 11
      - provider: kimi
        model: kimi-k2-thinking
        priority: 12
      - provider: minimax
        model: MiniMax-M2.7
        priority: 13

# Model selection strategy
selection_strategy:
  mode: priority  # priority, round-robin, least-cost, random
  fallback_enabled: true
  max_retries: 3
  timeout_seconds: 120

# Cost controls
cost_controls:
  max_cost_per_request: 2.00
  max_tokens_per_request: 100000
  daily_budget_usd: 1000.0
  alert_threshold_percent: 90

# Prompt caching configuration
prompt_cache:
  enabled: true
  similarity_threshold: 0.95
  ttl_seconds: 3600
  max_cache_size_mb: 2048

# Provider-specific settings
provider_settings:
  openai:
    base_url: https://api.openai.com/v1
    timeout: 300
    max_retries: 3
    
  anthropic:
    base_url: https://api.anthropic.com
    timeout: 300
    max_retries: 3
    
  google:
    base_url: https://generativelanguage.googleapis.com
    timeout: 300
    max_retries: 3
    
  deepseek:
    base_url: https://api.deepseek.com/v1
    timeout: 60
    max_retries: 3
    
  qwen:
    base_url: https://dashscope.aliyuncs.com/api/v1
    timeout: 60
    max_retries: 3
    
  bedrock:
    region: us-east-1
    timeout: 90
    max_retries: 3
    
  ollama:
    base_url: http://host.docker.internal:11434/v1
    timeout: 120
    max_retries: 2
    
  xai:
    base_url: https://api.x.ai/v1
    timeout: 60
    max_retries: 3
    
  zai:
    base_url: https://api.z.ai/api/paas/v4
    timeout: 60
    max_retries: 3

  kimi:
    base_url: https://api.moonshot.ai/v1
    timeout: 120
    max_retries: 0
    requests_per_minute: 30
    max_concurrent: 2

  minimax:
    base_url: https://api.minimax.io/v1
    timeout: 60
    max_retries: 3

  meta:
    base_url: https://api.together.xyz/v1  # Together AI for Llama models
    timeout: 90
    max_retries: 3
    
